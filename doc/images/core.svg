<?xml version="1.0" encoding="UTF-8" standalone="no"?>

<svg
	width="210mm"
	height="90mm"
	viewBox="0 0 840 360"
	version="1.1"
	id="mcmcu_block_diagram"
	xmlns="http://www.w3.org/2000/svg"
	xmlns:svg="http://www.w3.org/2000/svg">
	
	<style>
		.text {
			font: bold 23px consolas;
			text-anchor: middle;
		}
		
		.small {
			font: bold 13px consolas;
			text-anchor: middle;
		}
	</style>
	
	<defs>
		<g id="alu">
			<polygon points="0,0 80,80 80,180 0,260 0,200 40,160 40,100 0,60" fill="#F0F0F0" stroke="black" stroke-width="1" />
			<text x="60" y="137" class="text">ALU</text>
		</g>
		<g id="mux2">
			<polygon points="0,0 20,30 40,30 60,0" fill="#80C71F" stroke="black" stroke-width="1" />
			<line x1="10" y1="15" x2="3" y2="15" stroke="black" stroke-width="2" />
		</g>
		<g id="rf">
			<polygon points="0,0 50,0 50,260 0,260 " fill="#F9801D" stroke="black" stroke-width="1" />
			<text x="25" y="137" class="text">RF</text>
		</g>
		<g id="im">
			<polygon points="0,0 50,0 50,260 0,260 " fill="#3AB3DA" stroke="black" stroke-width="1" />
			<text x="25" y="137" class="text">IM</text>
		</g>
		<g id="cu">
			<polygon points="0,0 50,0 50,260 0,260 " fill="#FED83D" stroke="black" stroke-width="1" />
			<text x="25" y="137" class="text">CU</text>
		</g>
		<g id="sram">
			<polygon points="0,0 50,0 50,260 0,260 " fill="#F38BAA" stroke="black" stroke-width="1" />
			<text x="25" y="137" class="text">DM</text>
		</g>
		<g id="stack">
			<polygon points="0,0 50,0 50,260 0,260 " fill="#5E7C16" stroke="black" stroke-width="1" />
			<text x="25" y="137" class="text">S</text>
		</g>
		
		<g id="pc">
			<polygon points="0,0 50,0 50,60 0,60" fill="#169C9C" stroke="black" stroke-width="1" />
			<text x="25" y="37" class="text">PC</text>
			<polygon points="0,40 5,45 0,50" fill="none" stroke="black" />
		</g>
		
		<g id="cs">
			<polygon points="0,0 50,0 50,60 0,60" fill="#8932B8" stroke="black" stroke-width="1" />
			<text x="25" y="37" class="text">CS</text>
		</g>
		
		<g id="npc">
			<polygon points="0,0 50,0 50,60 0,60" fill="#9D9D97" stroke="black" stroke-width="1" />
			<text x="25" y="37" class="text">NPC</text>
		</g>
		
		<marker id="arrow" markerWidth="3" markerHeight="4" refX="2.5" refY="2" orient="auto">
			<path d="M0 0 L2 2 L0 4" stroke="black" stroke-width="1" fill="none" />
		</marker>
	</defs>
	
	<g id="top">
		<use href="#cs" transform="translate(70, 20)" />
		<use href="#pc" transform="translate(70, 120)" />
		<use href="#npc" transform="translate(70, 220)" />
		
		<use href="#im" transform="translate(180, 20)" />
		<use href="#cu" transform="translate(280, 20)" />
		<use href="#rf" transform="translate(380, 20)" />
		<use href="#alu" transform="translate(520,20)" />
		<use href="#sram" transform="translate(650,20)" />
		<use href="#stack" transform="translate(750,20)" />
		
		<use href="#mux2" transform="translate(80, 188) scale(-1, 1)" />
		<use href="#mux2" transform="translate(600, 270) rotate(90)" />
		<use href="#mux2" transform="translate(480, 280) rotate(270)" />
		
		<!-- PC Loop -->
		<path d="M120 150 H150 V250 H120" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M70 50 H60 V188" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M40 163 V188" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M50 218 V240 H70" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M50 270 V260 H70" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M95 120 V80" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M95 220 V180" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- PC -> IM -> CU -->
		<path d="M150 150 H180" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M230 150 H280" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M255 40 V50 H280" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- CU -> RF -->
		<path d="M330 50 H380" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M330 70 H380" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M330 240 H380" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- RF -> ALU -->
		<path d="M430 50 H520" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M430 240 H480" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M455 260 H480" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M510 250 H520" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- ALU -> DM & MUX -->
		<path d="M625 40 V50 H650" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M600 150 H650" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M600 150 H625 V280 H600" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- DM -> MUX -->
		<path d="M725 40 V50 H750" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M700 150 H725 V293 H600" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- S -> MUX -->
		<path d="M800 150 H825 V306 H600" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- MUX --> 
		<path d="M625 319 H600" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		<path d="M570 300 H365 V260 H380" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- CU -> NPC -->
		<path d="M330 260 H345 V300 H95 V280" stroke="black" stroke-width="3" fill="none" marker-end="url(#arrow)" />
		
		<!-- Labels -->
		<text x="50" y="281" class="small">R[rs]</text>
		<text x="255" y="36" class="small">R[rs]</text>
		<text x="725" y="36" class="small">R[rs]</text>
		<text x="625" y="36" class="small">R[rs]</text>
		<text x="640" y="323" class="small">Bus</text>
		<text x="444" y="265" class="small">i8</text>
		<text x="40" y="160" class="small">i12</text>
	</g>
	
</svg>
